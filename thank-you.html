<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark:    #0b1a22;
    --card:    #112638;
    --primary: #145474;
    --green:   #37ae40;
    --green-light: rgba(55,174,64,0.12);
    --text:    #e6edf3;
    --muted:   #8ba8b8;
    --border:  #1e3d52;
    --wa:      #25D366;
    --wa-dark: #128C7E;
  }

  body {
    font-family: 'Titillium Web', system-ui, sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 44px 16px 64px;
    background-image:
      radial-gradient(ellipse at 80% 10%, rgba(20,84,116,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 10% 90%, rgba(55,174,64,0.08) 0%, transparent 50%);
  }

  .container { width: 100%; max-width: 480px; text-align: center; animation: fadeUp 0.55s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap { margin-bottom: 36px; }
  .logo-wrap img { height: 70px; filter: brightness(0) invert(1); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 48px 36px 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .check-circle {
    width: 80px; height: 80px;
    background: var(--green-light);
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    font-size: 34px;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }
  @keyframes pop {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  h1 { font-size: 26px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }

  .accent-line {
    width: 40px; height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--green));
    border-radius: 2px;
    margin: 16px auto 20px;
  }

  .subtitle { font-size: 15px; color: var(--muted); line-height: 1.75; margin-bottom: 30px; }

  .summary {
    background: rgba(20,84,116,0.1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    text-align: left;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(30,61,82,0.6);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-key {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    white-space: nowrap; flex-shrink: 0;
  }
  .summary-val { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; }

  /* ── WhatsApp button ── */
  .btn-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 11px;
    background: var(--wa);
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    padding: 15px 24px;
    font-family: 'Titillium Web', system-ui, sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(37,211,102,0.28);
  }
  .btn-wa:hover  { background: #22c55e; box-shadow: 0 6px 28px rgba(37,211,102,0.4); }
  .btn-wa:active { transform: scale(0.98); }
  .btn-wa svg { flex-shrink: 0; }

  .footer-note {
    text-align: center; font-size: 12px; color: var(--muted);
    margin-top: 24px; line-height: 1.8;
  }
  .footer-note a { color: var(--green); text-decoration: none; }

  @media (max-width: 480px) {
    .card { padding: 36px 20px 32px; }
    body  { padding: 32px 12px 52px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo-wrap">
    <img src="https://static.wixstatic.com/media/78c590_4e2791f163fe4e0295b6f8f44179c16d~mv2.png/v1/crop/x_5,y_0,w_1601,h_659/fill/w_311,h_128,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/i42.png" alt="REIS Logística">
  </div>

  <div class="card">
    <div class="check-circle">✓</div>
    <h1>¡Recibimos tu información!</h1>
    <div class="accent-line"></div>
    <p class="subtitle">Nuestro equipo revisará tu solicitud y se comunicará contigo a la brevedad.</p>

    <div class="summary" id="summary">
      <span style="color:#556a78;font-size:14px;">Cargando…</span>
    </div>

    <a class="btn-wa" id="waLink"
      href="https://wa.me/+524447197812/?text=Hola%2C%20acabo%20de%20enviar%20mis%20datos%20para%20solicitar%20una%20cotizaci%C3%B3n.%20Quedo%20atento%20a%20su%20respuesta."
      target="_blank">
      <!-- Official WhatsApp SVG icon -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.978-1.412A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm-1.177 14.38c-1.01-.46-1.923-1.14-2.68-1.98-.743-.826-1.326-1.81-1.694-2.875-.19-.548-.284-1.12-.284-1.693 0-.668.14-1.322.42-1.925.285-.614.725-1.17 1.3-1.572.383-.267.81-.4 1.254-.4.15 0 .3.01.445.025.38.04.576.13.74.52l.943 2.23c.12.286.17.575.01.836-.11.183-.265.335-.44.46l-.445.315c-.17.12-.215.204-.17.38.153.58.484 1.104.896 1.553.413.45.91.836 1.468 1.08.178.079.277.05.4-.09l.45-.53c.16-.19.31-.27.51-.2l2.18.955c.39.17.483.36.45.74-.025.3-.085.6-.19.88-.26.7-.81 1.273-1.52 1.573-.446.19-.93.29-1.42.29a4.37 4.37 0 01-.724-.062z" fill="white"/>
      </svg>
      Escríbenos por WhatsApp
    </a>
  </div>

  <div class="footer-note">
    <a href="https://www.reislogistica.com" target="_blank">reislogistica.com</a>&nbsp;·&nbsp;
    <a href="https://www.reislogistica.com/_files/ugd/78c590_b00e48d3c8794e118bb01a8a8268a20f.pdf" target="_blank">Aviso de Privacidad</a>
    <br>©2026 REIS Logistics. All Rights Reserved.
  </div>
</div>

<script>
  const p   = new URLSearchParams(window.location.search);
  const get = k => (p.get(k) || '').trim();

  const nombre    = get('nombre');
  const email     = get('email');
  const whatsapp  = get('whatsapp');
  const servicio  = get('servicio');
  const ubicacion = get('ubicacion');
  const empresa   = get('empresa');
  const empleados = get('empleados');

  const rows = [
    ['Nombre',    nombre    || '—'],
    ['Empresa',   empresa   || '—'],
    ['Correo',    email     || '—'],
    ['WhatsApp',  whatsapp  || '—'],
    ['Servicio',  servicio  || '—'],
    ['Ubicación', ubicacion || '—'],
    ['Empleados', empleados || '—'],
  ];

  document.getElementById('summary').innerHTML = rows.map(([k, v]) => `
    <div class="summary-row">
      <span class="summary-key">${k}</span>
      <span class="summary-val">${v}</span>
    </div>
  `).join('');

  if (nombre || servicio) {
    const msg = encodeURIComponent(
      `Hola, acabo de enviar mis datos (${nombre}${empresa ? ' de ' + empresa : ''}) para solicitar una cotización de ${servicio}. Quedo atento a su respuesta.`
    );
    document.getElementById('waLink').href = `https://wa.me/+524447197812/?text=${msg}`;
  }

  fbq('track', 'CompleteRegistration');
</script>

</body>
</html>
