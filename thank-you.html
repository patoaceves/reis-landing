<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --dark:    #0b1a22;
    --card:    #112638;
    --primary: #145474;
    --green:   #37ae40;
    --green-light: rgba(55,174,64,0.12);
    --text:    #e6edf3;
    --muted:   #8ba8b8;
    --border:  #1e3d52;
    --wa:      #25D366;
    --wa-dark: #128C7E;
  }

  body {
    font-family: 'Titillium Web', system-ui, sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 44px 16px 64px;
    background-image:
      radial-gradient(ellipse at 80% 10%, rgba(20,84,116,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 10% 90%, rgba(55,174,64,0.08) 0%, transparent 50%);
  }

  .container { width: 100%; max-width: 480px; text-align: center; animation: fadeUp 0.55s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap { margin-bottom: 36px; }
  .logo-wrap img { height: 70px; filter: brightness(0) invert(1); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 48px 36px 44px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .check-circle {
    width: 80px; height: 80px;
    background: var(--green-light);
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px;
    font-size: 34px;
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }
  @keyframes pop {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  h1 { font-size: 26px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }

  .accent-line {
    width: 40px; height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--green));
    border-radius: 2px;
    margin: 16px auto 20px;
  }

  .subtitle { font-size: 15px; color: var(--muted); line-height: 1.75; margin-bottom: 30px; }

  .summary {
    background: rgba(20,84,116,0.1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    text-align: left;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(30,61,82,0.6);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-key {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    white-space: nowrap; flex-shrink: 0;
  }
  .summary-val { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; }

  /* ── WhatsApp button ── */
  .btn-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 11px;
    background: var(--wa);
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    padding: 15px 24px;
    font-family: 'Titillium Web', system-ui, sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(37,211,102,0.28);
  }
  .btn-wa:hover  { background: #22c55e; box-shadow: 0 6px 28px rgba(37,211,102,0.4); }
  .btn-wa:active { transform: scale(0.98); }
  .btn-wa svg { flex-shrink: 0; }

  .footer-note {
    text-align: center; font-size: 12px; color: var(--muted);
    margin-top: 24px; line-height: 1.8;
  }
  .footer-note a { color: var(--green); text-decoration: none; }

  @media (max-width: 480px) {
    .card { padding: 36px 20px 32px; }
    body  { padding: 32px 12px 52px; }
  }
</style>

<body>

<div class="container">

  <div class="logo-wrap">
    <img src="https://static.wixstatic.com/media/78c590_4e2791f163fe4e0295b6f8f44179c16d~mv2.png/v1/crop/x_5,y_0,w_1601,h_659/fill/w_311,h_128,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/i42.png" alt="REIS Logística">
  </div>

  <div class="card">
    <div class="check-circle">✓</div>
    <h1>¡Recibimos tu información!</h1>
    <div class="accent-line"></div>
    <p class="subtitle">Nuestro equipo revisará tu solicitud y se comunicará contigo a la brevedad.</p>

    <div class="summary" id="summary">
      <span style="color:#556a78;font-size:14px;">Cargando…</span>
    </div>

    <a class="btn-wa" id="waLink"
      href="https://wa.me/+524447197812/?text=Hola%2C%20acabo%20de%20enviar%20mis%20datos%20para%20solicitar%20una%20cotizaci%C3%B3n.%20Quedo%20atento%20a%20su%20respuesta."
      target="_blank">
      <!-- Official WhatsApp logo -->
      <svg width="24" height="24" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#fff" d="M24 4C13 4 4 13 4 24c0 3.6 1 7 2.7 9.9L4 44l10.4-2.7C17.2 43 20.5 44 24 44c11 0 20-9 20-20S35 4 24 4z"/>
        <path fill="#25D366" d="M24 6.8c-9.5 0-17.2 7.7-17.2 17.2 0 3.4 1 6.6 2.7 9.3l.4.7-1.7 6.2 6.4-1.7.7.4c2.6 1.5 5.6 2.4 8.7 2.4 9.5 0 17.2-7.7 17.2-17.2S33.5 6.8 24 6.8z"/>
        <path fill="#fff" fill-rule="evenodd" d="M19.2 15.6c-.4-.9-.8-.9-1.2-.9h-1c-.4 0-.9.1-1.4.7-.5.5-1.8 1.8-1.8 4.3s1.9 5 2.1 5.4c.3.4 3.6 5.7 8.9 7.8 4.4 1.7 5.3 1.4 6.2 1.3.9-.1 3-1.2 3.4-2.4.4-1.2.4-2.2.3-2.4-.1-.2-.4-.3-.9-.6-.4-.2-3-1.5-3.4-1.6-.4-.2-.7-.2-1 .2-.3.4-1.2 1.6-1.5 1.9-.3.3-.5.4-.9.1-.4-.2-1.8-.7-3.4-2.1-1.3-1.1-2.1-2.5-2.4-2.9-.2-.4 0-.6.2-.8l.7-.8c.2-.3.3-.5.4-.8.1-.3 0-.6-.1-.9l-1.2-3z"/>
      </svg>
      Escríbenos por WhatsApp
    </a>
  </div>

  <div class="footer-note">
    <a href="https://www.reislogistica.com" target="_blank">reislogistica.com</a>&nbsp;·&nbsp;
    <a href="https://www.reislogistica.com/_files/ugd/78c590_b00e48d3c8794e118bb01a8a8268a20f.pdf" target="_blank">Aviso de Privacidad</a>
    <br>©2026 REIS Logistics. All Rights Reserved.
  </div>
</div>

<script>
  const p   = new URLSearchParams(window.location.search);
  const get = k => (p.get(k) || '').trim();

  const nombre    = get('nombre');
  const email     = get('email');
  const whatsapp  = get('whatsapp');
  const servicio  = get('servicio');
  const ubicacion = get('ubicacion');
  const empresa   = get('empresa');
  const empleados = get('empleados');

  const rows = [
    ['Nombre',    nombre    || '—'],
    ['Empresa',   empresa   || '—'],
    ['Correo',    email     || '—'],
    ['WhatsApp',  whatsapp  || '—'],
    ['Servicio',  servicio  || '—'],
    ['Ubicación', ubicacion || '—'],
    ['Empleados', empleados || '—'],
  ];

  document.getElementById('summary').innerHTML = rows.map(([k, v]) => `
    <div class="summary-row">
      <span class="summary-key">${k}</span>
      <span class="summary-val">${v}</span>
    </div>
  `).join('');

  if (nombre || servicio) {
    const msg = encodeURIComponent(
      `Hola, acabo de enviar mis datos (${nombre}${empresa ? ' de ' + empresa : ''}) para solicitar una cotización de ${servicio}. Quedo atento a su respuesta.`
    );
    document.getElementById('waLink').href = `https://wa.me/+524447197812/?text=${msg}`;
  }

  fbq('track', 'CompleteRegistration');
</script>

</body>
